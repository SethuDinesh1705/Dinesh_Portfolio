<section id="contact" class="contact">
    <div class="container">
        <h2 class="section-title">Get In Touch</h2>

        <div class="contact-wrapper">
            <div class="contact-info">
                <div class="info-card">
                    <div class="info-icon">
                        <mat-icon>email</mat-icon>
                    </div>
                    <h3>Email</h3>
                    <p><a [href]="'mailto:' + email" [textContent]="email"></a></p>
                </div>

                <div class="info-card">
                    <div class="info-icon">
                        <mat-icon>location_on</mat-icon>
                    </div>
                    <h3>Location</h3>
                    <p>Chennai, Tamil Nadu<br>India</p>
                </div>

                <div class="info-card">
                    <div class="info-icon">
                        <mat-icon>phone</mat-icon>
                    </div>
                    <h3>Phone</h3>
                    <p><a href="tel:+917010120763">+91 7010120763</a></p>
                </div>

                <div class="social-connect">
                    <h3>Follow Me</h3>
                    <div class="social-icons">

                        <a href="https://www.linkedin.com/in/dineshkumar-thangavel-b94821180/" class="social-btn">
                            <mat-icon>business_center</mat-icon>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
